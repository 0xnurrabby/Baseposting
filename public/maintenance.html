<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BasePosting — Maintenance</title>

  <style>
    :root{
      --bg:#f7f7f6;
      --grid:rgba(17,24,39,.08);
      --card:#ffffff;
      --line:#e7e7e7;
      --text:#161616;
      --muted:#6b6b6b;
      --orange:#f08c00;
      --orange-soft:#fff4e6;
      --shadow:0 8px 24px rgba(0,0,0,.05);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 1px 1px, var(--grid) 1px, transparent 0);
      background-size:22px 22px;
      background-color:var(--bg);
    }

    .page{
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:24px;
    }

    .wrap{
      width:min(100%, 560px);
    }

    .brand{
      margin:0 0 10px;
      font-size:40px;
      line-height:1;
      letter-spacing:-.04em;
      font-weight:800;
      text-align:center;
    }

    .sub{
      margin:0 0 18px;
      text-align:center;
      color:var(--muted);
      font-size:15px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:24px;
      text-align:center;
    }

    .status{
      display:inline-flex;
      align-items:center;
      gap:8px;
      height:34px;
      padding:0 14px;
      border-radius:999px;
      background:var(--orange-soft);
      color:#7a4a00;
      border:1px solid #f7deb6;
      font-size:13px;
      font-weight:700;
      margin-bottom:14px;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--orange);
      flex:0 0 auto;
    }

    h2{
      margin:0 0 10px;
      font-size:38px;
      line-height:1.05;
      letter-spacing:-.04em;
      font-weight:800;
    }

    p{
      margin:0;
      color:var(--muted);
      font-size:16px;
      line-height:1.65;
    }

    .footer{
      margin-top:16px;
      text-align:center;
      color:#9a9a9a;
      font-size:13px;
    }

    @media (max-width: 640px){
      .brand{font-size:34px}
      h2{font-size:32px}
      .card{padding:20px}
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <h1 class="brand">BasePosting</h1>
      <p class="sub">Stay consistent, stay based, post banger 💙</p>

      <section class="card">
        <div class="status">
          <span class="dot"></span>
          Maintenance in progress
        </div>

        <h2>We’ll be back soon.</h2>
        <p>
          BasePosting is temporarily unavailable while we make a few improvements.
        </p>
      </section>

      <div class="footer">© Copyright 2026</div>
    </div>
  </main>
</body>
</html>
